const RPE_LABELS = {6:'Very easy',7:'Could do 3+ more',8:'Could do 2 more',9:'Could do 1 more',10:'Max effort'};

// ── HELPERS ───────────────────────────────────────────────────────
const fmtShort = iso => new Date(iso).toLocaleDateString('en-CA',{month:'short',day:'numeric'});
const fmtLong  = iso => new Date(iso).toLocaleDateString('en-CA',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
const fmtTime  = s => `${Math.floor(Math.max(s,0)/60)}:${(Math.max(s,0)%60).toString().padStart(2,'0')}`;
const fmtElap  = s => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
const epley    = (w,r) => { const ww=parseFloat(w),rr=parseInt(r); if(!ww||!rr||rr<=0)return null; return rr===1?ww:Math.round(ww*(1+rr/30)*10)/10; };
const best1RM  = sets => sets?sets.reduce((b,s)=>{const rm=epley(s.weight,s.reps);return(rm&&(!b||rm>b))?rm:b;},null):null;

const getTarget = (last, repsStr) => {
  if (!last||!last.length) return null;
  const v=last.filter(s=>s.weight&&s.reps); if(!v.length) return null;
  const p=repsStr.split('-'),top=parseInt(p[p.length-1]),bot=parseInt(p[0]);
  const avgW=v.reduce((a,s)=>a+parseFloat(s.weight),0)/v.length;
  const rt=avgW<45?2.5:5;
  if (v.every(s=>parseInt(s.reps)>=top)) {
    const nw=Math.round((avgW+rt)/rt)*rt;
    return {weight:nw,reps:bot,label:`↑ Add weight → try ${nw}lbs × ${bot}`};
  }
  const avgR=Math.round(v.reduce((a,s)=>a+parseInt(s.reps),0)/v.length);
  return {weight:avgW,reps:Math.min(avgR+1,top),label:`→ Same weight, push for ${Math.min(avgR+1,top)}+ reps`};
};
const hint = (last,repsStr) => {
  const p=repsStr.split('-'),top=parseInt(p[p.length-1]),bot=parseInt(p[0]);
  if(last.every(s=>parseInt(s.reps)>=top)) return '↑ Hit the top — try adding weight';
  if(last.every(s=>parseInt(s.reps)>=bot)) return '→ Solid — push for more reps';
  return '↗ Build reps before adding weight';
};

const saveH  = h => localStorage.setItem(SK,JSON.stringify(h));
const loadS  = () => { try{return JSON.parse(localStorage.getItem(SSK));}catch{return null;} };
const saveS  = s => { if(s)localStorage.setItem(SSK,JSON.stringify(s));else localStorage.removeItem(SSK); };

// ── AUDIO ─────────────────────────────────────────────────────────
let _ac=null;
const getAC = () => { if(!_ac||_ac.state==='closed')try{_ac=new(window.AudioContext||window.webkitAudioContext)();}catch{}return _ac; };
const unlockAudio = () => { const c=getAC(); if(c&&c.state==='suspended')c.resume().catch(()=>{}); };
const beep = (ctx,at) => [[880,0],[1100,0.22]].forEach(([f,off])=>{
  try{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);
  o.type='sine';o.frequency.value=f;const t=at+off;
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.55,t+0.01);g.gain.exponentialRampToValueAtTime(0.001,t+0.18);
  o.start(t);o.stop(t+0.2);}catch{}
});

let elapsedIv = null;
function startElapsed() {
  clearInterval(elapsedIv);
  if (!S.session) return;
  elapsedIv = setInterval(()=>{
    S.elapsed = Math.floor((Date.now()-S.session.startTime)/1000);
    const el=document.getElementById('etxt'); if(el)el.textContent=fmtElap(S.elapsed);
  },1000);
}

// ── REST TIMERS ───────────────────────────────────────────────────
function startRest(key) {
  stopRest(key);
  const end=Date.now()+90000;
  const ctx=getAC();
  if(ctx){if(ctx.state==='suspended')ctx.resume().catch(()=>{});beep(ctx,ctx.currentTime+90);}
  const iv=setInterval(()=>{
    const rem=Math.max(0,Math.round((end-Date.now())/1000));
    const tel=document.getElementById('rt-'+key),bel=document.getElementById('rb-'+key),lel=document.getElementById('rl-'+key);
    if(rem<=0){
      clearInterval(iv);
      if(bel)bel.classList.add('done-rest');
      if(tel)tel.textContent='✓';
      if(lel)lel.textContent='Rest done — go!';
      S.restTimers[key]={...S.restTimers[key],done:true};
      setTimeout(()=>skipRest(key),2500);
    } else { if(tel)tel.textContent=fmtTime(rem); }
  },500);
  S.restTimers[key]={end,iv,done:false};
}
function stopRest(key){if(S.restTimers[key]){clearInterval(S.restTimers[key].iv);delete S.restTimers[key];}}
function skipRest(key){stopRest(key);const el=document.getElementById('rb-'+key);if(el)el.style.display='none';}
function clearAllRest(){Object.keys(S.restTimers).forEach(stopRest);}

// ── SESSION ───────────────────────────────────────────────────────
function startWorkout(dayId) {
  const day=DAYS.find(d=>d.id===dayId);
  const sd={},dd={};
  day.exercises.forEach(ex=>{
    sd[ex.id]=Array.from({length:ex.sets},()=>({weight:'',reps:'',done:false,rpe:null}));
    if(ex.dropSet)dd[ex.id]={weight:'',reps:'',done:false};
  });
  S.session={dayId,setData:sd,dropData:dd,activeSubs:{},startTime:Date.now()};
  S.elapsed=0; S.restTimers={};
  saveS(S.session); startElapsed(); goScreen('workout');
}
function updSet(exId,idx,f,v){S.session.setData[exId][idx][f]=v;saveS(S.session);}
function updDrop(exId,f,v){S.session.dropData[exId][f]=v;saveS(S.session);}
function togSet(exId,idx){
  const s=S.session.setData[exId][idx];s.done=!s.done;saveS(S.session);
  if(s.done)startRest(exId+'_'+idx);else stopRest(exId+'_'+idx);render();
}
function togDrop(exId){
  const d=S.session.dropData[exId];d.done=!d.done;saveS(S.session);
  if(d.done)startRest(exId+'_drop');else stopRest(exId+'_drop');render();
}
function togSub(exId){const s=S.session.activeSubs;s[exId]!==undefined?delete s[exId]:s[exId]=0;saveS(S.session);render();}

function calcProg(sess){
  if(!sess)return{total:0,done:0,pct:0};
  const day=DAYS.find(d=>d.id===sess.dayId);let t=0,d=0;
  day.exercises.forEach(ex=>{t+=sess.setData[ex.id].length;d+=sess.setData[ex.id].filter(s=>s.done).length;if(ex.dropSet){t+=1;if(sess.dropData[ex.id]?.done)d+=1;}});
  return{total:t,done:d,pct:t?Math.round(d/t*100):0};
}

function getPRs(sess){
  const prs=[];
  const day=DAYS.find(d=>d.id===sess.dayId);
  day.exercises.forEach(ex=>{
    const cur=best1RM(sess.setData[ex.id].filter(s=>s.done||s.weight));if(!cur)return;
    const best=S.history.reduce((b,e)=>{const rm=best1RM((e.sets?.[ex.id]||[]).filter(s=>s.done||s.weight));return rm&&rm>b?rm:b;},0);
    if(cur>best)prs.push(ex.id);
  });
  return prs;
}

function confirmFinish(){
  const {total,done}=calcProg(S.session);
  if(done===0){alert('Log at least one set first!');return;}
  const inc=total-done;
  if(inc>0&&!confirm(`${inc} set${inc>1?'s':''} not marked done. Finish anyway?`))return;
  finish();
}
function finish(){
  clearAllRest();clearInterval(elapsedIv);
  const day=DAYS.find(d=>d.id===S.session.dayId);
  const dur=Math.round((Date.now()-S.session.startTime)/60000);
  const sets={},drops={};
  day.exercises.forEach(ex=>{
    sets[ex.id]=S.session.setData[ex.id].filter(s=>s.done||s.weight||s.reps);
    if(ex.dropSet&&(S.session.dropData[ex.id].done||S.session.dropData[ex.id].weight))drops[ex.id]=S.session.dropData[ex.id];
  });
  const prs=getPRs(S.session);
  const entry={dayId:S.session.dayId,dayName:day.name,date:new Date().toISOString(),duration:dur,sets,drops};
  S.history=[...S.history,entry];saveH(S.history);
  const td=Object.values(sets).reduce((a,s)=>a+s.filter(x=>x.done).length,0);
  S.summary={day,entry,duration:dur,totalDone:td,prs};
  S.session=null;saveS(null);goScreen('summary');
}
function discard(){
  if(!confirm('Discard this workout? All progress will be lost.'))return;
  clearAllRest();clearInterval(elapsedIv);S.session=null;saveS(null);goScreen('home');
}

function goScreen(sc){S.screen=sc;saveSc(sc);render();}
function handleDayTap(dayId){
  if(S.session?.dayId===dayId){goScreen('workout');return;}
  if(S.session&&!confirm('Workout in progress. Discard it?'))return;
  if(S.session){clearAllRest();clearInterval(elapsedIv);S.session=null;saveS(null);}
  startWorkout(dayId);
}

function restBannerHTML(key){
  const t=S.restTimers[key];if(!t)return'';
  const rem=Math.max(0,Math.round((t.end-Date.now())/1000));
  return `<div class="rest-banner${t.done?' done-rest':''}" id="rb-${key}">
    <span class="rest-time" id="rt-${key}">${t.done?'✓':fmtTime(rem)}</span>
    <span class="rest-lbl" id="rl-${key}">${t.done?'Rest done — go!':'Rest'}</span>
    ${!t.done?`<button class="rest-skip" onclick="skipRest('${key}')">Skip</button>`:''}
  </div>`;
}

function exCardHTML(ex, dayId){
  const sess=S.session,sd=sess.setData[ex.id],dd=sess.dropData?.[ex.id];
  const last=S.history.slice().reverse().find(e=>e.dayId===dayId)||null;
  const lastEx=last?.sets?.[ex.id]||null,lastDrop=last?.drops?.[ex.id]||null;
  const sub=sess.activeSubs[ex.id]!==undefined;
  const dName=sub&&ex.subs[0]?ex.subs[0].name:ex.name;
  const dNote=sub&&ex.subs[0]?ex.subs[0].note:ex.note;
  const allW=sd.every(s=>s.done),allD=allW&&(!ex.dropSet||dd?.done),anyD=sd.some(s=>s.done);
  const lwDone=sd[sd.length-1]?.done;
  const tgt=getTarget(lastEx,ex.reps);

    <div class="ex-badge">${ex.sets}×${ex.reps}</div></div></div>`;
  if(dNote)h+=`<div class="ex-note">${dNote}</div>`;
  if(ex.subs.length&&!allD)h+=`<div class="sub-btn-wrap"><button class="sub-btn" onclick="togSub('${ex.id}')">${sub?`Using: ${ex.subs[0].name} — switch back`:`Sub: ${ex.subs[0].name}`}</button></div>`;
  if(tgt&&!allD)h+=`<div class="target-box"><div class="target-label">Today's Target</div><div class="target-text">${tgt.label}</div></div>`;
  if(lastEx?.length){
    const rm=best1RM(lastEx.filter(s=>s.done||s.weight));
    const h2=lastEx.every(s=>s.weight&&s.reps)?hint(lastEx,ex.reps):'';
    h+=`<div class="last-box"><div class="last-label">Last Session</div><div class="last-chips">
      ${lastEx.map(ls=>`<span class="last-chip">${ls.weight?ls.weight+'lbs':'—'} × ${ls.reps||'—'}${ls.rpe?` @${ls.rpe}`:''}</span>`).join('')}
      ${ex.dropSet&&lastDrop&&(lastDrop.weight||lastDrop.reps)?`<span class="last-chip drop">↓ ${lastDrop.weight||'?'}lbs × ${lastDrop.reps||'?'}</span>`:''}
    </div>${rm?`<div class="last-rm">Est. 1RM: ${rm}lbs</div>`:''}${h2?`<div class="last-hint">${h2}</div>`:''}</div>`;
  }
  h+=`<div class="sets-area">`;

    const rk=ex.id+'_'+idx;

      <input class="set-input${set.done?' done':''}" type="number" inputmode="numeric" placeholder="${tgt?tgt.reps:'reps'}" value="${set.reps}" ${set.done?'readonly':''} onchange="updSet('${ex.id}',${idx},'reps',this.value)">
      <button class="check-btn${set.done?' done':''}" onclick="togSet('${ex.id}',${idx})">${set.done?'✓':'○'}</button>
    </div>`;
    if(set.done)h+=`<div class="rpe-row"><span class="rpe-label">RPE</span>
      ${[6,7,8,9,10].map(r=>`<button class="rpe-btn${set.rpe===r?' sel':''}" title="${RPE_LABELS[r]}" onclick="updSet('${ex.id}',${idx},'rpe',${set.rpe===r?'null':r})">${r}</button>`).join('')}
      ${set.rpe?`<span class="rpe-hint">${RPE_LABELS[set.rpe]}</span>`:''}</div>`;
    if(S.restTimers[rk])h+=restBannerHTML(rk);
  });
  h+=`</div>`;
  if(ex.dropSet){
    h+=`<div class="drop-area${!lwDone&&!dd?.done?' faded':''}"><div class="drop-label">↓ Drop Set — reduce ~20-30%, go to failure</div>

        <input class="set-input drop-inp${dd?.done?' done':''}" type="number" inputmode="numeric" placeholder="reps" value="${dd?.reps||''}" ${dd?.done?'readonly':''} onchange="updDrop('${ex.id}','reps',this.value)">

      </div>${S.restTimers[ex.id+'_drop']?restBannerHTML(ex.id+'_drop'):''}

function volumeHTML(){
  const now=Date.now(),wk=7*24*60*60*1000;
  const recent=S.history.filter(e=>now-new Date(e.date).getTime()<wk);
  const ms={};
  recent.forEach(e=>{
    const day=DAYS.find(d=>d.id===e.dayId);if(!day)return;
    day.exercises.forEach(ex=>{
      const done=(e.sets?.[ex.id]||[]).filter(s=>s.done).length;if(!done)return;
      const m=EX_MUSCLES[ex.id];if(!m)return;ms[m]=(ms[m]||0)+done;
    });
  });
  const prMap={};
  S.history.forEach(e=>{
    const day=DAYS.find(d=>d.id===e.dayId);if(!day)return;
    day.exercises.forEach(ex=>{
      const rm=best1RM((e.sets?.[ex.id]||[]).filter(s=>s.done||s.weight));
      if(rm&&(!prMap[ex.id]||rm>prMap[ex.id].rm))prMap[ex.id]={rm,date:e.date,exName:ex.name};
    });
  });
  let h=`<div class="sec-label">Weekly Volume · Past 7 Days</div>`;
  if(!recent.length)h+=`<div class="empty"><div class="empty-icon">📊</div>Complete a workout to see volume</div>`;
  else Object.keys(MUSCLE_TARGETS).forEach(m=>{
    const sets=ms[m]||0,t=MUSCLE_TARGETS[m];
    const pct=Math.min(sets/t.max*100,100);
    const col=sets<t.min?'#b86e00':sets>t.max?'#1d5fa8':'#2d7a4f';
    const lbl=sets===0?'0 sets':sets<t.min?`${sets} — aim for ${t.min}+`:sets>t.max?`${sets} — above target`:`${sets} ✓`;
    h+=`<div class="vol-bar-wrap">
      <div class="vol-bar-row"><span class="vol-bar-name">${m}</span><span class="vol-bar-status" style="color:${col}">${lbl}</span></div>
      <div class="vol-bar-bg"><div class="vol-bar-fill" style="width:${pct}%;background:${col}"></div></div>
      <div class="vol-bar-minmax"><span>${t.min} min</span><span>${t.max} max</span></div>
    </div>`;
  });
  h+=`<div class="sec-label" style="margin-top:24px">Personal Records · Est. 1RM</div>`;
  const prs=Object.entries(prMap).sort((a,b)=>b[1].rm-a[1].rm);
  if(!prs.length)h+=`<div class="empty"><div class="empty-icon">🏆</div>No PRs yet — get lifting</div>`;
  else prs.forEach(([,pr])=>h+=`<div class="pr-row"><div><div class="pr-row-name">${pr.exName}</div><div class="pr-row-date">${fmtShort(pr.date)}</div></div><div><div class="pr-row-val">${pr.rm}lbs</div><div class="pr-row-unit">est. 1RM</div></div></div>`);
  return h;
}

// ── RENDER ────────────────────────────────────────────────────────
function render(){
  const {screen,session,history,summary}=S;
  const prog=calcProg(session);
  const actDay=session?DAYS.find(d=>d.id===session.dayId):null;
  const titles={home:'Select Workout',summary:'Done!',history:'History',volume:'Dashboard'};
  const title=screen==='workout'?actDay?.name:titles[screen]||'';
  const badge=screen==='workout'?actDay?.type:screen==='summary'?'✓':'—';

  const navTabs=(active)=>['Workout','Volume','History'].map(t=>{
    const sc={Workout:'home',Volume:'volume',History:'history'};
    return `<button class="nav-tab${active===sc[t]?' active':''}" onclick="goScreen('${sc[t]}')">${t}</button>`;
  }).join('');

  const sessBanner=session&&screen!=='workout'?`<div class="session-banner" onclick="goScreen('workout')">
    <div style="flex:1"><div class="session-banner-title">${actDay?.name} in progress</div>
    <div class="session-banner-sub">${prog.done}/${prog.total} sets · <span id="etxt">${fmtElap(S.elapsed)}</span> · tap to return</div></div>
    <div class="session-banner-arrow">→</div></div>`:'';

  let content='';

  if(screen==='home'){
    const cards=DAYS.map(day=>{
      const last=S.history.slice().reverse().find(e=>e.dayId===day.id)||null;
      const isAct=session?.dayId===day.id;
      return `<div class="day-card${isAct?' is-active':last?' has-history':''}" onclick="handleDayTap('${day.id}')">
        ${last&&!isAct?'<div class="green-dot"></div>':''}
        <div class="day-card-type">${day.type}</div>
        <div class="day-card-name">${day.name}</div>
        <div class="day-card-sub">${isAct?`${prog.done}/${prog.total} sets · in progress`:day.focus}</div>
        ${last&&!isAct?`<div class="day-card-last">Last: ${fmtShort(last.date)}</div>`:''}
        ${isAct?'<div class="day-card-last">Tap to resume →</div>':''}
      </div>`;
    }).join('');
    content=`<div class="pad"><div class="nav-tabs">${navTabs('home')}</div>${sessBanner}<div class="sec-label">Choose Day</div><div class="day-grid">${cards}</div></div>`;
  }
  else if(screen==='workout'&&session&&actDay){
    const cards=actDay.exercises.map(ex=>exCardHTML(ex,session.dayId)).join('');
    content=`<div class="pad">${cards}<div style="margin:28px 0 8px">
      <button class="finish-btn" onclick="confirmFinish()">✓ Finish Workout</button>
      <div class="finish-hint">Tap when you're done — nothing saves automatically</div>
      <button class="discard-btn" onclick="discard()">Discard Workout</button>
    </div></div>`;
  }
  else if(screen==='summary'&&summary){
    const prBlock=summary.prs?.length?`<div class="pr-callout"><div class="pr-callout-title">🏆 New PRs this session</div>
      ${summary.prs.map(id=>{const ex=DAYS.flatMap(d=>d.exercises).find(e=>e.id===id);const rm=best1RM(summary.entry.sets[id]||[]);return ex?`<div class="pr-callout-item">${ex.name}${rm?` — ${rm}lbs est. 1RM`:''}</div>`:''}).join('')}</div>`:'';
    content=`<div class="pad"><div class="summary-card"><div class="summary-icon">✓</div>
      <div class="summary-title">${summary.day.name} Complete</div><div class="summary-date">${fmtLong(summary.entry.date)}</div></div>
      ${prBlock}<div class="stat-grid">
        ${[['Duration',`${summary.duration}m`],['Sets Done',summary.totalDone],['Exercises',summary.day.exercises.length]].map(([l,v])=>`<div class="stat-box"><div class="stat-val">${v}</div><div class="stat-lbl">${l}</div></div>`).join('')}
      </div><button class="back-btn" onclick="goScreen('home')">← Back to Home</button></div>`;
  }
  else if(screen==='volume'){
    content=`<div class="pad"><div class="nav-tabs">${navTabs('volume')}</div>${sessBanner}${volumeHTML()}</div>`;
  }
  else if(screen==='history'){
    const entries=[...history].reverse().map(entry=>{
      const day=DAYS.find(d=>d.id===entry.dayId);
      const lines=day?.exercises.map(ex=>{
        const sets=entry.sets?.[ex.id];if(!sets?.length)return'';
        const s=sets.filter(s=>s.done||s.weight).map(s=>`${s.weight||'?'}lbs×${s.reps||'?'}${s.rpe?`@${s.rpe}`:''}`).join(', ');
        const dr=entry.drops?.[ex.id];
        const ds=dr&&(dr.weight||dr.reps)?` ↓${dr.weight||'?'}lbs×${dr.reps||'?'}`:''
        return s?`<div>${ex.name}: ${s}${ds}</div>`:'';
      }).join('')||'';
      return `<div class="hist-entry"><div class="hist-date">${fmtLong(entry.date)} · ${entry.duration||'—'}min</div>
        <div class="hist-day">${entry.dayName}</div><div class="hist-exs">${lines||'—'}</div></div>`;
    }).join('');
    content=`<div class="pad"><div class="nav-tabs">${navTabs('history')}</div>${sessBanner}<div class="sec-label">Past Sessions</div>
      ${history.length?entries:'<div class="empty"><div class="empty-icon">📋</div>No sessions yet</div>'}</div>`;
  }

  let modal='';
  if(S.formModal){
    const ex=DAYS.flatMap(d=>d.exercises).find(e=>e.id===S.formModal);
    const fm=FORM[S.formModal];
    if(ex&&fm)modal=`<div class="modal-overlay" onclick="closeForm()"><div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div class="modal-header"><div><div class="modal-title-label">Form Guide</div><div class="modal-title">${ex.name}</div></div>
        <button class="modal-close" onclick="closeForm()">✕</button></div>
      <div class="form-cues-label">Key Cues</div>
      ${fm.cues.map((c,i)=>`<div class="form-cue-row"><div class="form-cue-num">${i+1}.</div><div class="form-cue-text">${c}</div></div>`).join('')}
      <div class="breathing-box" style="margin-top:16px"><div class="breathing-label">Breathing</div><div class="breathing-text">${fm.breathing}</div></div>
      ${fm.shoulder?`<div class="shoulder-box" style="margin-top:12px"><div class="shoulder-label">Shoulder Note</div><div class="shoulder-text">${fm.shoulder}</div></div>`:''}
    </div></div>`;
  }

  document.getElementById('app').innerHTML=`<div onclick="unlockAudio()">
    <div class="header">
      <div class="header-row">
        <div><div class="logo">Recomp Workout</div><div class="day-label">${title}</div></div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
          <div class="badge">${badge}</div>
          ${screen==='workout'?`<div class="timer-txt" id="etxt">${fmtElap(S.elapsed)}</div>`:''}
        </div>
      </div>
      ${screen==='workout'?`<div class="prog-bar-wrap"><div class="prog-bar-fill" style="width:${prog.pct}%"></div></div><div class="prog-lbl">${prog.done} / ${prog.total} sets</div>`:''}
    </div>
    ${content}${modal}
  </div>`;
}

// ── GLOBALS ───────────────────────────────────────────────────────
window.goScreen=goScreen;window.handleDayTap=handleDayTap;window.togSet=togSet;
window.togDrop=togDrop;window.togSub=togSub;window.updSet=updSet;window.updDrop=updDrop;
window.confirmFinish=confirmFinish;window.discard=discard;window.skipRest=skipRest;
window.unlockAudio=unlockAudio;window.openForm=id=>{S.formModal=id;render();};
window.closeForm=()=>{S.formModal=null;render();};

// ── SERVICE WORKER ────────────────────────────────────────────────
if('serviceWorker'in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}

render();
</script>
</body>
</html>
