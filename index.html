<!DOCTYPE html>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#fff;color:#1a1a18;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;line-height:1.5;min-height:100vh;padding-bottom:48px}

.prog-bar-wrap{margin-top:12px;height:3px;background:#efefec;border-radius:2px;overflow:hidden}

.day-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.day-card{background:#f7f7f5;border:1.5px solid #e0ddd8;border-radius:12px;padding:18px 16px;cursor:pointer;position:relative;overflow:hidden}
.day-card.has-history{background:#edf7f1;border-color:#b8ddc9}
.day-card.is-active{background:#1a1a18;border-color:#1a1a18}
.day-card-type{font-family:monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#888880;margin-bottom:4px}
.day-card.is-active .day-card-type,.day-card.is-active .day-card-sub,.day-card.is-active .day-card-last{color:rgba(255,255,255,.65)}
.day-card.is-active .day-card-name{color:#fff}
.day-card-name{font-size:17px;font-weight:700}
.day-card-sub{font-size:12px;color:#888880;margin-top:3px}
.day-card-last{font-size:11px;color:#2d7a4f;margin-top:6px}
.green-dot{position:absolute;top:12px;right:12px;width:8px;height:8px;border-radius:50%;background:#2d7a4f}

.session-banner-sub{font-size:12px;color:rgba(255,255,255,.6);margin-top:1px}
.session-banner-arrow{font-size:20px;color:#fff;flex-shrink:0}
.ex-card{background:#f7f7f5;border:1.5px solid #e0ddd8;border-radius:12px;margin-bottom:14px;overflow:hidden}
.ex-card.any-done{border-color:#1a1a18}
.ex-card.all-done{background:#edf7f1;border-color:#b8ddc9;opacity:.78}
.ex-header{padding:14px 16px 10px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.ex-name{font-size:16px;font-weight:700;flex:1}
.ex-header-right{display:flex;gap:6px;align-items:center;flex-shrink:0}
.ex-badge{font-family:monospace;font-size:11px;background:#efefec;padding:3px 8px;border-radius:20px;color:#888880;white-space:nowrap}
.form-btn{font-family:monospace;font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:#888880;background:#efefec;border:1px solid #e0ddd8;border-radius:20px;padding:3px 9px}
.ex-note{font-size:12px;color:#888880;padding:0 16px 10px}
.sub-btn-wrap{padding:0 16px 12px}
.sub-btn{font-size:12px;font-weight:500;color:#1d5fa8;background:#eef4fc;border:1.5px solid #b8d0f0;border-radius:20px;padding:5px 14px}
.target-box{margin:0 16px 12px;padding:10px 14px;background:#f3eefa;border:1.5px solid #c9aff0;border-radius:8px}
.target-label{font-family:monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#6b3fa0;margin-bottom:4px;font-weight:500}
.target-text{font-size:14px;font-weight:600;color:#6b3fa0}
.last-box{margin:0 16px 12px;padding:10px 14px;background:#fff8ed;border:1.5px solid #f5d49a;border-radius:8px}
.last-label{font-family:monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#b86e00;margin-bottom:6px;font-weight:500}
.last-chips{display:flex;flex-wrap:wrap;gap:6px}
.last-chip{font-family:monospace;font-size:13px;font-weight:500;color:#b86e00;background:#fff;border:1px solid #f5d49a;padding:4px 10px;border-radius:20px}
.last-chip.drop{color:#c0392b;border-color:#f5c6c2}
.last-rm{font-size:11px;color:#b86e00;font-family:monospace;margin-top:6px}
.last-hint{font-size:12px;color:#b86e00;margin-top:4px;font-style:italic}
.sets-area{padding:0 16px 14px}
.set-row{display:grid;grid-template-columns:28px 1fr 1fr auto;gap:8px;align-items:center;margin-bottom:4px}
.set-num{font-family:monospace;font-size:12px;color:#888880;text-align:center}
.set-input{background:#fff;border:1.5px solid #e0ddd8;border-radius:8px;padding:10px 12px;font-family:monospace;font-size:15px;font-weight:500;color:#1a1a18;width:100%;text-align:center}
.set-input.done{background:#edf7f1;border-color:#b8ddc9}
.set-input.drop-inp{background:#fdf2f1;border-color:#f5c6c2}
.set-input.drop-inp.done{background:#edf7f1;border-color:#b8ddc9}
.check-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #e0ddd8;background:#fff;color:#888880;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.check-btn.done{background:#2d7a4f;border-color:#2d7a4f;color:#fff}
.check-btn.drop-btn{border-color:#f5c6c2;color:#c0392b}
.check-btn.drop-btn.done{background:#2d7a4f;border-color:#2d7a4f;color:#fff}
.rpe-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;padding-left:36px}
.rpe-label{font-family:monospace;font-size:10px;color:#888880;letter-spacing:.05em;white-space:nowrap}
.rpe-hint{font-size:11px;color:#888880;font-style:italic}
.rpe-btn{width:30px;height:26px;border-radius:6px;border:1.5px solid #e0ddd8;background:#fff;color:#888880;font-family:monospace;font-size:12px;font-weight:600}
.rpe-btn.sel{background:#1a1a18;border-color:#1a1a18;color:#fff}
.drop-area{padding:10px 16px 14px;border-top:1px dashed #e0ddd8}
.drop-area.faded{opacity:.4}
.drop-label{font-family:monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#c0392b;margin-bottom:8px}
.rest-banner{margin:8px 0 4px;padding:10px 14px;background:#eef4fc;border:1.5px solid #b8d0f0;border-radius:8px;display:flex;align-items:center;gap:10px}
.rest-banner.done-rest{background:#edf7f1;border-color:#b8ddc9}
.rest-time{font-family:monospace;font-size:20px;font-weight:500;color:#1d5fa8;min-width:42px}
.rest-banner.done-rest .rest-time{color:#2d7a4f}
.rest-lbl{font-size:13px;color:#1d5fa8;flex:1}
.rest-banner.done-rest .rest-lbl{color:#2d7a4f}
.rest-skip{font-size:12px;font-weight:500;color:#1d5fa8;background:none;border:1px solid #b8d0f0;border-radius:20px;padding:4px 10px}
.pr-banner{background:#fffbeb;border-bottom:1px solid #f5d87a;padding:7px 16px;display:flex;align-items:center;gap:8px}
.pr-banner-text{font-size:13px;font-weight:600;color:#b8860b}
.finish-btn{width:100%;padding:17px;background:#1a1a18;color:#fff;font-size:16px;font-weight:700;border:none;border-radius:12px}
.finish-hint{font-size:12px;color:#b0ada6;text-align:center;margin-top:8px}
.pause-btn{width:100%;margin-top:10px;padding:14px;background:#fff8ed;border:1.5px solid #f5d49a;border-radius:12px;font-size:15px;font-weight:600;color:#b86e00}
.resume-btn{width:100%;padding:17px;background:#b86e00;color:#fff;font-size:16px;font-weight:700;border:none;border-radius:12px}
.paused-banner{background:#fff8ed;border:1.5px solid #f5d49a;border-radius:12px;padding:20px;text-align:center;margin-bottom:16px}
.paused-icon{font-size:32px;margin-bottom:8px}
.paused-title{font-size:18px;font-weight:700;color:#b86e00;margin-bottom:4px}
.paused-sub{font-size:13px;color:#888880}
.discard-btn{width:100%;margin-top:12px;padding:12px;background:none;border:1.5px solid #e0ddd8;border-radius:12px;font-size:14px;color:#888880}
.summary-card{background:#edf7f1;border:1.5px solid #b8ddc9;border-radius:12px;padding:24px 20px;text-align:center;margin-bottom:16px}
.summary-icon{font-size:40px;margin-bottom:10px}
.summary-title{font-size:22px;font-weight:700;margin-bottom:6px}
.summary-date{font-size:14px;color:#888880}
.pr-callout{background:#fffbeb;border:1.5px solid #f5d87a;border-radius:12px;padding:14px 16px;margin-bottom:16px}
.pr-callout-title{font-size:14px;font-weight:700;color:#b8860b;margin-bottom:6px}
.pr-callout-item{font-size:13px;color:#b8860b;margin-bottom:2px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px}
.stat-box{background:#f7f7f5;border:1.5px solid #e0ddd8;border-radius:8px;padding:14px 10px;text-align:center}
.stat-val{font-family:monospace;font-size:22px;font-weight:500}
.stat-lbl{font-size:11px;color:#888880;margin-top:2px}
.back-btn{width:100%;padding:15px;background:#f7f7f5;border:1.5px solid #e0ddd8;border-radius:12px;font-size:15px;font-weight:500;color:#1a1a18}
.vol-bar-wrap{margin-bottom:14px}
.vol-bar-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.vol-bar-name{font-size:14px;font-weight:600}
.vol-bar-status{font-size:12px;font-family:monospace}
.vol-bar-bg{height:8px;background:#efefec;border-radius:4px;overflow:hidden}
.vol-bar-fill{height:100%;border-radius:4px;transition:width .5s}
.vol-bar-minmax{display:flex;justify-content:space-between;margin-top:3px}
.vol-bar-minmax span{font-size:10px;color:#b0ada6;font-family:monospace}
.pr-row{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;background:#f7f7f5;border:1.5px solid #e0ddd8;border-radius:10px;margin-bottom:8px}
.pr-row-name{font-size:14px;font-weight:600}
.pr-row-date{font-size:11px;color:#888880;margin-top:2px;font-family:monospace}
.pr-row-val{font-family:monospace;font-size:18px;font-weight:700;color:#b8860b;text-align:right}
.pr-row-unit{font-size:10px;color:#888880;font-family:monospace}
.hist-entry{background:#f7f7f5;border:1.5px solid #e0ddd8;border-radius:12px;padding:14px 16px;margin-bottom:10px}
.hist-date{font-family:monospace;font-size:11px;color:#888880;margin-bottom:4px}
.hist-day{font-size:16px;font-weight:700;margin-bottom:8px}
.hist-exs{font-size:13px;color:#888880;line-height:1.7}
.empty{text-align:center;padding:40px 20px;color:#888880;font-size:14px}
.empty-icon{font-size:36px;margin-bottom:10px}
/* Plate Calculator */
.plate-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;background:#1a1a18;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;margin-bottom:20px;cursor:pointer}
.plate-calc-wrap{background:#f7f7f5;border:1.5px solid #e0ddd8;border-radius:12px;padding:16px;margin-bottom:20px}
.plate-calc-title{font-family:monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#888880;margin-bottom:12px}
.plate-input-row{display:flex;gap:10px;align-items:center;margin-bottom:12px}
.plate-input{background:#fff;border:1.5px solid #e0ddd8;border-radius:8px;padding:10px 14px;font-family:monospace;font-size:20px;font-weight:600;color:#1a1a18;width:100%;text-align:center;-webkit-appearance:none}
.bar-toggle{display:flex;gap:6px}
.bar-opt{padding:7px 12px;background:#fff;border:1.5px solid #e0ddd8;border-radius:8px;font-size:12px;font-weight:600;color:#888880;cursor:pointer;font-family:monospace}
.bar-opt.active{background:#1a1a18;border-color:#1a1a18;color:#fff}
.plate-result{margin-top:4px}
.plate-result-label{font-size:13px;color:#888880;margin-bottom:8px}
.plate-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.plate-chip{font-family:monospace;font-size:13px;font-weight:700;padding:6px 12px;border-radius:8px;border:2px solid}
.plate-chip.p45{background:#fdf2f1;border-color:#c0392b;color:#c0392b}
.plate-chip.p35{background:#fff8ed;border-color:#b86e00;color:#b86e00}
.plate-chip.p25{background:#eef4fc;border-color:#1d5fa8;color:#1d5fa8}
.plate-chip.p10{background:#edf7f1;border-color:#2d7a4f;color:#2d7a4f}
.plate-chip.p5{background:#f3eefa;border-color:#6b3fa0;color:#6b3fa0}
.plate-chip.p25s{background:#f7f7f5;border-color:#888880;color:#888880}
.plate-total{font-family:monospace;font-size:12px;color:#888880;margin-top:6px}
.plate-impossible{font-size:13px;color:#c0392b;margin-top:4px}
/* Strength Graphs */
.graph-wrap{margin-bottom:24px}
.graph-title{font-size:14px;font-weight:700;margin-bottom:4px}
.graph-sub{font-family:monospace;font-size:11px;color:#888880;margin-bottom:8px}
.graph-svg{width:100%;overflow:visible}
.graph-empty{font-size:12px;color:#b0ada6;font-style:italic;padding:8px 0}
/* Bodyweight */
.bw-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.bw-input{background:#fff;border:1.5px solid #e0ddd8;border-radius:8px;padding:9px 12px;font-family:monospace;font-size:15px;font-weight:500;color:#1a1a18;flex:1;text-align:center;-webkit-appearance:none}
.bw-save-btn{padding:9px 16px;background:#1a1a18;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.bw-entry{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0ede8;font-size:13px}
.bw-entry-date{color:#888880;font-family:monospace;font-size:11px}
.bw-entry-val{font-family:monospace;font-weight:600}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end}
.modal-sheet{background:#fff;border-radius:16px 16px 0 0;width:100%;max-height:80vh;overflow-y:auto;padding:24px 20px 40px}
.modal-handle{width:36px;height:4px;background:#e0ddd8;border-radius:2px;margin:0 auto 20px}
.modal-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
.modal-title-label{font-family:monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#888880;margin-bottom:4px}
.modal-title{font-size:19px;font-weight:700}
.modal-close{background:#efefec;border:none;border-radius:50%;width:32px;height:32px;font-size:16px;color:#888880;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.form-cues-label{font-family:monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#888880;margin-bottom:10px}
.form-cue-row{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start}
.form-cue-num{font-family:monospace;font-size:12px;font-weight:700;color:#1a1a18;min-width:20px;margin-top:1px}
.form-cue-text{font-size:14px;color:#1a1a18;line-height:1.5}
.breathing-box{padding:12px 14px;background:#eef4fc;border:1.5px solid #b8d0f0;border-radius:8px;margin-bottom:12px}
.breathing-label{font-family:monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#1d5fa8;margin-bottom:4px}
.breathing-text{font-size:14px;color:#1d5fa8}
.shoulder-box{padding:12px 14px;background:#fff8ed;border:1.5px solid #f5d49a;border-radius:8px}
.shoulder-label{font-family:monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#b86e00;margin-bottom:4px}
.shoulder-text{font-size:14px;color:#b86e00}
</style>

const fmtShort = iso => new Date(iso).toLocaleDateString('en-CA',{month:'short',day:'numeric'});
const fmtLong  = iso => new Date(iso).toLocaleDateString('en-CA',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
const fmtTime  = s => `${Math.floor(Math.max(s,0)/60)}:${(Math.max(s,0)%60).toString().padStart(2,'0')}`;
const fmtElap  = s => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
const epley    = (w,r) => { const ww=parseFloat(w),rr=parseInt(r); if(!ww||!rr||rr<=0)return null; return rr===1?ww:Math.round(ww*(1+rr/30)*10)/10; };
const best1RM  = sets => sets?sets.reduce((b,s)=>{const rm=epley(s.weight,s.reps);return(rm&&(!b||rm>b))?rm:b;},null):null;

const getTarget = (last, repsStr) => {
  if (!last||!last.length) return null;
  const v=last.filter(s=>s.weight&&s.reps); if(!v.length) return null;
  const p=repsStr.split('-'),top=parseInt(p[p.length-1]),bot=parseInt(p[0]);
  const avgW=v.reduce((a,s)=>a+parseFloat(s.weight),0)/v.length;
  const rt = 5;
  if (v.every(s=>parseInt(s.reps)>=top)) {
    const nw=Math.round((avgW+rt)/rt)*rt;
    return {weight:nw,reps:bot,label:`Add weight — try ${nw}lbs × ${bot} reps`};
  }
  const avgR=Math.round(v.reduce((a,s)=>a+parseInt(s.reps),0)/v.length);
  return {weight:avgW,reps:Math.min(avgR+1,top),label:`Same weight — push for ${Math.min(avgR+1,top)}+ reps`};
};
const hint = (last,repsStr) => {
  const p=repsStr.split('-'),top=parseInt(p[p.length-1]),bot=parseInt(p[0]);
  if(last.every(s=>parseInt(s.reps)>=top)) return 'Hit the top of the range — add weight next session';
  if(last.every(s=>parseInt(s.reps)>=bot)) return 'Good — push for more reps next session';
  return 'Build reps before adding weight';
};

let _ac=null;
const getAC = () => { if(!_ac||_ac.state==='closed')try{_ac=new(window.AudioContext||window.webkitAudioContext)();}catch{}return _ac; };
const unlockAudio = () => { const c=getAC(); if(c&&c.state==='suspended')c.resume().catch(()=>{}); };

function playTone(ctx, freq, startAt, dur=0.3, vol=1.0) {
  try {
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type='sine'; o.frequency.value=freq;
    g.gain.setValueAtTime(0, startAt);
    g.gain.linearRampToValueAtTime(vol, startAt+0.01);
    g.gain.exponentialRampToValueAtTime(0.001, startAt+dur);
    o.start(startAt); o.stop(startAt+dur+0.05);
  } catch {}
}

function scheduleCountdown(ctx, endTimestamp) {
  const now = Date.now();
  [3, 2, 1].forEach(sec => {
    const msUntil = (endTimestamp - now) - (sec * 1000);
    if (msUntil < 100) return;
    const audioAt = ctx.currentTime + msUntil / 1000;
    playTone(ctx, 660, audioAt, 0.15, 0.8);
  });
  const msUntilEnd = endTimestamp - now;
  if (msUntilEnd > 0) {
    const finAt = ctx.currentTime + msUntilEnd / 1000;
    playTone(ctx, 880,  finAt,       0.25, 1.0);
    playTone(ctx, 1100, finAt+0.28,  0.25, 1.0);
    playTone(ctx, 1320, finAt+0.56,  0.4,  1.0);
  }
}

// Reschedule all active rest timers when screen unlocks
// This is the fix for iOS killing scheduled audio during screen lock
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState !== 'visible') return;
  const ctx = getAC();
  if (!ctx) return;
  ctx.resume().then(() => {
    Object.entries(S.restTimers).forEach(([key, t]) => {
      if (t.done) return;
      const rem = (t.endTs - Date.now()) / 1000;
      if (rem <= 0) return;
      // Reschedule the audio from now with correct remaining time
      scheduleCountdown(ctx, t.endTs);
    });
  }).catch(() => {});
});

function startRest(key, dur=90) {
  stopRest(key);
  const endTs = Date.now() + (dur * 1000);
  const ctx = getAC();
  if (ctx) {
    if (ctx.state==='suspended') ctx.resume().catch(()=>{});
    scheduleCountdown(ctx, endTs);
  }
  const iv = setInterval(()=>{
    const rem = Math.max(0, Math.round((endTs - Date.now()) / 1000));
    const tel=document.getElementById('rt-'+key);
    const bel=document.getElementById('rb-'+key);
    const lel=document.getElementById('rl-'+key);
    if (rem <= 0) {
      clearInterval(iv);
      if (bel) bel.classList.add('done-rest');
      if (tel) tel.textContent = '✓';
      if (lel) lel.textContent = 'Rest done — go!';
      S.restTimers[key] = {...S.restTimers[key], done:true};
      setTimeout(()=>skipRest(key), 2500);
    } else {
      // Show 3-2-1 in display during countdown
      if (tel) tel.textContent = rem <= 3 ? `${rem}` : fmtTime(rem);
      if (lel && rem <= 3) lel.textContent = 'Get ready...';
    }
  }, 250);
  S.restTimers[key] = {endTs, iv, done:false, dur};
}
function stopRest(key){if(S.restTimers[key]){clearInterval(S.restTimers[key].iv);delete S.restTimers[key];}}
function skipRest(key){stopRest(key);const el=document.getElementById('rb-'+key);if(el)el.style.display='none';}
function clearAllRest(){Object.keys(S.restTimers).forEach(stopRest);}

// ── SESSION ───────────────────────────────────────────────────────
function startWorkout(dayId) {
  const day=DAYS.find(d=>d.id===dayId);
  const sd={},dd={};
  const lastSession = S.history.slice().reverse().find(e=>e.dayId===dayId)||null;
  day.exercises.forEach(ex=>{
    const lastEx = lastSession?.sets?.[ex.id]||null;
    const tgt = getTarget(lastEx, ex.reps);
    // Pre-populate with suggested weight/reps from progressive overload logic
    const prefillW = tgt ? String(tgt.weight) : '';
    const prefillR = tgt ? String(tgt.reps) : '';
    sd[ex.id]=Array.from({length:ex.sets},()=>({weight:prefillW,reps:prefillR,done:false,rpe:null}));
    if(ex.dropSet){
      // Drop set: suggest ~70% of working weight
      const dropW = tgt ? String(Math.round(tgt.weight*0.7/2.5)*2.5) : '';
      dd[ex.id]={weight:dropW,reps:'',done:false};
    }
  });
  S.session={dayId,setData:sd,dropData:dd,activeSubs:{},startTime:Date.now()};
  S.elapsed=0; S.restTimers={};
  saveS(S.session); startElapsed(); goScreen('workout');
}
function updSet(exId,idx,f,v){S.session.setData[exId][idx][f]=v;saveS(S.session);}
function updDrop(exId,f,v){S.session.dropData[exId][f]=v;saveS(S.session);}
function togSet(exId,idx){
  const s=S.session.setData[exId][idx];
  s.done=!s.done;
  saveS(S.session);
  if(s.done) startRest(exId+'_'+idx, restDur(exId));
  else stopRest(exId+'_'+idx);
  render();
}
function togDrop(exId){
  // No rest before drop set — strip weight and go immediately
  // Rest starts AFTER the drop set
  const d=S.session.dropData[exId];
  const wasDone=d.done;
  d.done=!d.done;
  saveS(S.session);
  if(!wasDone) startRest(exId+'_drop', 90);
  else stopRest(exId+'_drop');
  render();
}
function togSub(exId){const s=S.session.activeSubs;s[exId]!==undefined?delete s[exId]:s[exId]=0;saveS(S.session);render();}

function calcProg(sess){
  if(!sess)return{total:0,done:0,pct:0};
  const day=DAYS.find(d=>d.id===sess.dayId);let t=0,d=0;
  day.exercises.forEach(ex=>{t+=sess.setData[ex.id].length;d+=sess.setData[ex.id].filter(s=>s.done).length;if(ex.dropSet){t+=1;if(sess.dropData[ex.id]?.done)d+=1;}});
  return{total:t,done:d,pct:t?Math.round(d/t*100):0};
}

function getPRs(sess){
  const prs=[];
  const day=DAYS.find(d=>d.id===sess.dayId);
  day.exercises.forEach(ex=>{
    const cur=best1RM(sess.setData[ex.id].filter(s=>s.done||s.weight));if(!cur)return;
    const best=S.history.reduce((b,e)=>{const rm=best1RM((e.sets?.[ex.id]||[]).filter(s=>s.done||s.weight));return rm&&rm>b?rm:b;},0);
    if(cur>best)prs.push(ex.id);
  });
  return prs;
}

function confirmFinish(){
  const {total,done}=calcProg(S.session);
  if(done===0){alert('Log at least one set first!');return;}
  const inc=total-done;
  if(inc>0&&!confirm(`${inc} set${inc>1?'s':''} not marked done. Finish anyway?`))return;
  finish();
}
function finish(){
  clearAllRest();clearInterval(elapsedIv);
  const day=DAYS.find(d=>d.id===S.session.dayId);
  const dur=Math.round((Date.now()-S.session.startTime)/60000);
  const sets={},drops={};
  day.exercises.forEach(ex=>{
    sets[ex.id]=S.session.setData[ex.id].filter(s=>s.done||s.weight||s.reps);
    if(ex.dropSet&&(S.session.dropData[ex.id].done||S.session.dropData[ex.id].weight))drops[ex.id]=S.session.dropData[ex.id];
  });
  const prs=getPRs(S.session);
  const entry={dayId:S.session.dayId,dayName:day.name,date:new Date().toISOString(),duration:dur,sets,drops};
  S.history=[...S.history,entry];saveH(S.history);
  const td=Object.values(sets).reduce((a,s)=>a+s.filter(x=>x.done).length,0);
  S.summary={day,entry,duration:dur,totalDone:td,prs};
  S.session=null;saveS(null);goScreen('summary');
}
function discard(){
  if(!confirm('Discard this workout? All progress will be lost.'))return;
  clearAllRest();clearInterval(elapsedIv);S.session=null;saveS(null);goScreen('home');
}

function pauseWorkout() {
  S.paused = true;
  S.pausedAt = Date.now();
  clearInterval(elapsedIv);
  // Pause all rest timers by extending their endTs
  render();
}
function resumeWorkout() {
  if (!S.paused || !S.pausedAt) return;
  const pauseDur = Date.now() - S.pausedAt;
  S.session.startTime += pauseDur;
  saveS(S.session);
  Object.keys(S.restTimers).forEach(key => {
    if (!S.restTimers[key].done) {
      S.restTimers[key].endTs += pauseDur;
      const ctx = getAC();
      if (ctx) scheduleCountdown(ctx, S.restTimers[key].endTs);
    }
  });
  S.paused = false;
  S.pausedAt = null;
  startElapsed();
  render();
}
function goScreen(sc){S.screen=sc;saveSc(sc);render();}
function handleDayTap(dayId){
  if(S.session?.dayId===dayId){goScreen('workout');return;}
  if(S.session&&!confirm('Workout in progress. Discard it?'))return;
  if(S.session){clearAllRest();clearInterval(elapsedIv);S.session=null;saveS(null);}
  startWorkout(dayId);
}

// ── PLATE CALCULATOR ──────────────────────────────────────────────
const PLATES = [45,35,25,10,5,2.5];
const PLATE_CLASS = {45:'p45',35:'p35',25:'p25',10:'p10',5:'p5',2.5:'p25s'};

function calcPlates(target, barWeight) {
  let remaining = (target - barWeight) / 2;
  if (remaining < 0) return null;
  const result = [];
  for (const plate of PLATES) {
    const count = Math.floor(remaining / plate);
    if (count > 0) { result.push({plate, count}); remaining = Math.round((remaining - plate*count)*100)/100; }
  }
  if (remaining > 0.1) return null; // can't make exact weight
  return result;
}

function platesHTML() {
  const target = S.plateTarget || '';
  const bar = S.plateBar || 45;
  let resultHTML = '';
  if (target) {
    const t = parseFloat(target);
    if (t < bar) {
      resultHTML = `<div class="plate-impossible">Target must be heavier than the bar (${bar}lbs)</div>`;
    } else {
      const plates = calcPlates(t, bar);
      if (!plates) {
        resultHTML = `<div class="plate-impossible">Can't make exactly ${t}lbs with standard plates — try ${Math.round(t/2.5)*2.5}lbs</div>`;
      } else if (plates.length === 0) {
        resultHTML = `<div class="plate-result-label">Just the bar! (${bar}lbs)</div>`;
      } else {
        const chips = plates.map(({plate,count}) =>
          `<span class="plate-chip ${PLATE_CLASS[plate]}">${count}×${plate}</span>`
        ).join('');
        resultHTML = `<div class="plate-result">
          <div class="plate-result-label">Each side:</div>
          <div class="plate-chips">${chips}</div>
          <div class="plate-total">Bar ${bar}lbs + ${(t-bar)/2}lbs per side = ${t}lbs total</div>
        </div>`;
      }
    }
  }
  return `<div class="plate-calc-wrap">
    <div class="plate-calc-title">🏋️ Plate Calculator</div>
    <div class="plate-input-row">
      <input class="plate-input" type="number" inputmode="decimal" placeholder="Target lbs"
        value="${target}" onchange="S.plateTarget=this.value;render()">
      <div class="bar-toggle">
        <button class="bar-opt${bar===45?' active':''}" onclick="S.plateBar=45;render()">45lb bar</button>
        <button class="bar-opt${bar===35?' active':''}" onclick="S.plateBar=35;render()">35lb bar</button>
      </div>
    </div>
    ${resultHTML}
  </div>`;
}

// ── STRENGTH GRAPHS ───────────────────────────────────────────────
const GRAPH_LIFTS = [
  {label:'Squat',         ids:['squat']},
  {label:'Deadlift',      ids:['deadlift']},
  {label:'Landmine Press',ids:['landmine_press']},
  {label:'Chest Row',     ids:['chest_sup_row_a','chest_sup_row_b','chest_sup_row_c']},
  {label:'Lat Pulldown',  ids:['lat_pulldown']},
  {label:'DB Curl',       ids:['db_curl_a','db_curl_c']},
];

function strengthGraphHTML() {
  let h = `<div class="sec-label" style="margin-top:28px">Strength Trends · Est. 1RM</div>`;
  GRAPH_LIFTS.forEach(lift => {
    // Collect data points: {date, rm}
    const points = [];
    S.history.forEach(entry => {
      let bestRM = null;
      lift.ids.forEach(id => {
        const rm = best1RM((entry.sets?.[id]||[]).filter(s=>s.done||s.weight));
        if (rm && (!bestRM||rm>bestRM)) bestRM = rm;
      });
      if (bestRM) points.push({date: new Date(entry.date).getTime(), rm: bestRM});
    });
    // Sort by date
    points.sort((a,b)=>a.date-b.date);

    h += `<div class="graph-wrap">`;
    h += `<div class="graph-title">${lift.label}</div>`;

    if (points.length < 2) {
      const latest = points[0];
      h += `<div class="graph-sub">${latest?`Current: ${latest.rm}lbs est. 1RM`:'No data yet'}</div>`;
      if (!latest) { h += `</div>`; return; }
    }

    const latest = points[points.length-1];
    const first = points[0];
    const change = points.length > 1 ? latest.rm - first.rm : 0;
    const changeStr = change > 0 ? `+${Math.round(change*10)/10}lbs` : change < 0 ? `${Math.round(change*10)/10}lbs` : 'No change';
    const changeColor = change > 0 ? '#2d7a4f' : change < 0 ? '#c0392b' : '#888880';

    h += `<div class="graph-sub" style="display:flex;justify-content:space-between">
      <span>Latest: <strong>${latest.rm}lbs</strong></span>
      <span style="color:${changeColor}">${changeStr} overall</span>
    </div>`;

    if (points.length >= 2) {
      // SVG line graph
      const W=300, H=70, PAD=4;
      const minRM = Math.min(...points.map(p=>p.rm)) * 0.95;
      const maxRM = Math.max(...points.map(p=>p.rm)) * 1.05;
      const minDate = points[0].date, maxDate = points[points.length-1].date;
      const xScale = maxDate===minDate ? 0 : (W-PAD*2)/(maxDate-minDate);
      const yScale = maxRM===minRM ? 0 : (H-PAD*2)/(maxRM-minRM);
      const toX = d => PAD + (d-minDate)*xScale;
      const toY = rm => H-PAD - (rm-minRM)*yScale;

      const pathD = points.map((p,i)=>`${i===0?'M':'L'}${toX(p.date).toFixed(1)},${toY(p.rm).toFixed(1)}`).join(' ');
      const dots = points.map(p=>`<circle cx="${toX(p.date).toFixed(1)}" cy="${toY(p.rm).toFixed(1)}" r="3" fill="#1a1a18"/>`).join('');

      h += `<svg class="graph-svg" viewBox="0 0 ${W} ${H}" height="${H}">
        <path d="${pathD}" fill="none" stroke="#1a1a18" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
        ${dots}
      </svg>`;
    }
    h += `</div>`;
  });
  return h;
}

      ${summary.prs.map(id=>{const ex=DAYS.flatMap(d=>d.exercises).find(e=>e.id===id);const rm=best1RM(summary.entry.sets[id]||[]);return ex?`<div class="pr-callout-item">${ex.name}${rm?` — ${rm}lbs est. 1RM`:''}</div>`:''}).join('')}</div>`:'';
    content=`<div class="pad"><div class="summary-card"><div class="summary-icon">✓</div>
      <div class="summary-title">${summary.day.name} Complete</div><div class="summary-date">${fmtLong(summary.entry.date)}</div></div>
      ${prBlock}<div class="stat-grid">
        ${[['Duration',`${summary.duration}m`],['Sets Done',summary.totalDone],['Exercises',summary.day.exercises.length]].map(([l,v])=>`<div class="stat-box"><div class="stat-val">${v}</div><div class="stat-lbl">${l}</div></div>`).join('')}
      </div><button class="back-btn" onclick="goScreen('home')">← Back to Home</button></div>`;
  }
  else if(screen==='volume'){
    content=`<div class="pad"><div class="nav-tabs">${navTabs('volume')}</div>${sessBanner}${volumeHTML()}</div>`;
  }
  else if(screen==='history'){
    const entries=[...history].reverse().map(entry=>{
      const day=DAYS.find(d=>d.id===entry.dayId);
      const lines=day?.exercises.map(ex=>{
        const sets=entry.sets?.[ex.id];if(!sets?.length)return'';
        const s=sets.filter(s=>s.done||s.weight).map(s=>`${s.weight||'?'}lbs×${s.reps||'?'}${s.rpe?`@${s.rpe}`:''}`).join(', ');
        const dr=entry.drops?.[ex.id];
        const ds=dr&&(dr.weight||dr.reps)?` ↓${dr.weight||'?'}lbs×${dr.reps||'?'}`:''
        return s?`<div>${ex.name}: ${s}${ds}</div>`:'';
      }).join('')||'';
      return `<div class="hist-entry"><div class="hist-date">${fmtLong(entry.date)} · ${entry.duration||'—'}min</div>
        <div class="hist-day">${entry.dayName}</div><div class="hist-exs">${lines||'—'}</div></div>`;
    }).join('');
    content=`<div class="pad"><div class="nav-tabs">${navTabs('history')}</div>${sessBanner}<div class="sec-label">Past Sessions</div>
      ${history.length?entries:'<div class="empty"><div class="empty-icon">📋</div>No sessions yet</div>'}</div>`;
  }

  let modal='';
  if(S.formModal){
    const ex=DAYS.flatMap(d=>d.exercises).find(e=>e.id===S.formModal);
    const fm=FORM[S.formModal];
    if(ex&&fm)modal=`<div class="modal-overlay" onclick="closeForm()"><div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div class="modal-header"><div><div class="modal-title-label">Form Guide</div><div class="modal-title">${ex.name}</div></div>
        <button class="modal-close" onclick="closeForm()">✕</button></div>
      <div class="form-cues-label">Key Cues</div>
      ${fm.cues.map((c,i)=>`<div class="form-cue-row"><div class="form-cue-num">${i+1}.</div><div class="form-cue-text">${c}</div></div>`).join('')}
      <div class="breathing-box" style="margin-top:16px"><div class="breathing-label">Breathing</div><div class="breathing-text">${fm.breathing}</div></div>
      ${fm.shoulder?`<div class="shoulder-box" style="margin-top:12px"><div class="shoulder-label">Shoulder Note</div><div class="shoulder-text">${fm.shoulder}</div></div>`:''}
    </div></div>`;
  }

  document.getElementById('app').innerHTML=`<div onclick="unlockAudio()">
    <div class="header">
      <div class="header-row">
        <div><div class="logo">Recomp Workout</div><div class="day-label">${title}</div></div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
          <div class="badge">${badge}</div>
          ${screen==='workout'?`<div class="timer-txt" id="etxt">${fmtElap(S.elapsed)}</div>`:''}
        </div>
      </div>
      ${screen==='workout'?`<div class="prog-bar-wrap"><div class="prog-bar-fill" style="width:${prog.pct}%"></div></div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:5px">
          <div class="prog-lbl">${prog.done} / ${prog.total} sets</div>
          ${!S.paused
            ? `<button onclick="pauseWorkout()" style="font-family:monospace;font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:#b86e00;background:#fff8ed;border:1px solid #f5d49a;border-radius:20px;padding:3px 10px">⏸ Pause</button>`
            : `<button onclick="resumeWorkout()" style="font-family:monospace;font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:#2d7a4f;background:#edf7f1;border:1px solid #b8ddc9;border-radius:20px;padding:3px 10px">▶ Resume</button>`
          }
        </div>`:''}
    </div>
    ${content}${modal}
  </div>`;
}

// ── GLOBALS ───────────────────────────────────────────────────────
window.goScreen=goScreen;window.handleDayTap=handleDayTap;window.togSet=togSet;
window.togDrop=togDrop;window.togSub=togSub;window.updSet=updSet;window.updDrop=updDrop;
window.confirmFinish=confirmFinish;window.discard=discard;window.skipRest=skipRest;
window.unlockAudio=unlockAudio;window.openForm=id=>{S.formModal=id;render();};
window.closeForm=()=>{S.formModal=null;render();};
window.logBodyweight=logBodyweight;
window.pauseWorkout=pauseWorkout;window.resumeWorkout=resumeWorkout;

// ── SERVICE WORKER ────────────────────────────────────────────────
if('serviceWorker'in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}

render();
</script>
</body>
</html>
